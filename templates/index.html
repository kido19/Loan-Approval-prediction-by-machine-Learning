<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Predictor | WealthPredict</title>
    <meta name="description" content="AI-powered loan approval prediction using real financial data.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <img src="{{ url_for('static', filename='gold_dollar.png') }}" class="floating-dollar fd-1" alt="">
    <img src="{{ url_for('static', filename='gold_dollar.png') }}" class="floating-dollar fd-2" alt="">
    <img src="{{ url_for('static', filename='gold_dollar.png') }}" class="floating-dollar fd-3" alt="">
    <img src="{{ url_for('static', filename='gold_dollar.png') }}" class="floating-dollar fd-4" alt="">
    <img src="{{ url_for('static', filename='gold_dollar.png') }}" class="floating-dollar fd-5" alt="">
    <img src="{{ url_for('static', filename='gold_dollar.png') }}" class="floating-dollar fd-6" alt="">

    <nav class="navbar">
        <div class="logo">

        </div>
    </nav>

    <div class="glass-container">
        <header>
            <h1>Loan Predictor</h1>
            <p>Calculate your loan approval status instantly using AI</p>
        </header>

        <form id="loan-form">
            <div class="form-grid">

                <div class="input-group">
                    <label for="education">Education</label>
                    <select id="education" name="education" required>
                        <option value="Graduate">Graduate</option>
                        <option value="Not Graduate">Not Graduate</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="self_employed">Self Employed</label>
                    <select id="self_employed" name="self_employed" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="no_of_dependents">No. of Dependents</label>
                    <select id="no_of_dependents" name="no_of_dependents" required>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="loan_term">Loan Term (Years)</label>
                    <select id="loan_term" name="loan_term" required>
                        <option value="2">2 Years</option>
                        <option value="4">4 Years</option>
                        <option value="6">6 Years</option>
                        <option value="8">8 Years</option>
                        <option value="10">10 Years</option>
                        <option value="12">12 Years</option>
                        <option value="14">14 Years</option>
                        <option value="16">16 Years</option>
                        <option value="18">18 Years</option>
                        <option value="20">20 Years</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="income_annum">Annual Income (ETB)</label>
                    <input type="number" id="income_annum" name="income_annum" placeholder="e.g. 5000000" min="0"
                        required>
                </div>

                <div class="input-group">
                    <label for="loan_amount">Loan Amount (ETB)</label>
                    <input type="number" id="loan_amount" name="loan_amount" placeholder="e.g. 10000000" min="0"
                        required>
                </div>

                <div class="input-group">
                    <label for="cibil_score">CIBIL Score (300–900)</label>
                    <input type="number" id="cibil_score" name="cibil_score" placeholder="e.g. 750" min="300" max="900"
                        required>
                </div>

                <div class="input-group">
                    <label for="residential_assets_value">Residential Assets (ETB)</label>
                    <input type="number" id="residential_assets_value" name="residential_assets_value"
                        placeholder="e.g. 5000000" min="0" required>
                </div>

                <div class="input-group">
                    <label for="commercial_assets_value">Commercial Assets (ETB)</label>
                    <input type="number" id="commercial_assets_value" name="commercial_assets_value"
                        placeholder="e.g. 2000000" min="0" required>
                </div>

                <div class="input-group">
                    <label for="luxury_assets_value">Luxury Assets (ETB)</label>
                    <input type="number" id="luxury_assets_value" name="luxury_assets_value" placeholder="e.g. 3000000"
                        min="0" required>
                </div>

                <div class="input-group">
                    <label for="bank_asset_value">Bank Asset Value (ETB)</label>
                    <input type="number" id="bank_asset_value" name="bank_asset_value" placeholder="e.g. 1000000"
                        min="0" required>
                </div>

            </div>

            <button type="submit" class="glow-on-hover" id="predict-btn">Predict Approval</button>
        </form>

        <div id="result-container" class="hidden">
            <h2 id="result-text"></h2>
            <p id="result-sub"></p>
        </div>
    </div>

    <div class="features-section">

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
